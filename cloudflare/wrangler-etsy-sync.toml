# Etsy Sync Worker Configuration
name = "troves-etsy-sync"
main = "cloudflare/etsy-sync-worker.js"
compatibility_date = "2024-01-01"
workers_dev = true

# KV Namespace for storing synced products
[[kv_namespaces]]
binding = "ETSY_PRODUCTS"
id = "etsy_products_namespace"

# Cron Triggers - Sync every 6 hours
[triggers]
crons = ["0 */6 * * *"]  # At minute 0 past every 6 hours

# Environment variables
[vars]
ETSY_SHOP_URL = "https://www.etsy.com/ca/shop/TrovesandCoves"
SYNC_INTERVAL_HOURS = "6"
PRODUCT_CACHE_TTL = "604800"  # 7 days

# Production environment
[env.production]
name = "troves-etsy-sync-prod"

[[env.production.kv_namespaces]]
binding = "ETSY_PRODUCTS"
id = "etsy_products_namespace_prod"

[env.production.vars]
ENVIRONMENT = "production"
