name: Main Branch CI

# Triggered on push to main branch
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  # Run tests on main branch
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Run unit tests
        run: npm run test

  # Sync products from Etsy (if needed)
  etsy-sync:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Deploy Etsy Sync Worker to Cloudflare
        run: |
          # Check if KV namespace exists, create if not
          if ! wrangler kv:namespace list | grep -q "ETSY_PRODUCTS"; then
            echo "Creating ETSY_PRODUCTS KV namespace..."
            wrangler kv:namespace create "ETSY_PRODUCTS" --preview false
          fi

          # Deploy the Etsy sync worker
          wrangler deploy --config cloudflare/wrangler-etsy-sync.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Trigger product sync
        run: |
          echo "Triggering product sync..."
          curl -X POST "https://troves-etsy-sync.${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.workers.dev/sync" || true
        continue-on-error: true
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  # Merge to prod if tests pass
  merge-to-prod:
    runs-on: ubuntu-latest
    needs: [test]
    if: success() && github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge main to prod
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin prod
          git checkout prod
          git merge main --no-edit
          git push origin prod
