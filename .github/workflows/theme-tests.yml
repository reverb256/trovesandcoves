name: Theme Toggle Tests

on:
  # Run on push to main (after deployment)
  push:
    branches: [main]
    paths:
      - 'client/src/**'
      - 'tests/e2e/theme-toggle.spec.ts'
      - '.github/workflows/theme-tests.yml'

  # Run on pull requests targeting main
  pull_request:
    branches: [main]
    paths:
      - 'client/src/**'
      - 'tests/e2e/theme-toggle.spec.ts'
      - '.github/workflows/theme-tests.yml'

  # Allow manual triggering
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to test against'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

  # Run weekly as a smoke test against production
  schedule:
    - cron: '0 2 * * 1'  # Every Monday at 2 AM UTC

jobs:
  theme-tests:
    name: Theme Toggle Tests (${{ matrix.browser }})
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        # Test on multiple browsers for comprehensive coverage
        browser: [chromium, firefox, webkit]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Run theme toggle tests
        run: npx playwright test theme-toggle.spec.ts --project=${{ matrix.browser }}
        env:
          CI: true
          # Test against production by default
          PRODUCTION_URL: ${{ github.event.inputs.environment == 'staging' && 'https://staging.trovesandcoves.ca' || 'https://trovesandcoves.ca' }}

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ matrix.browser }}
          path: playwright-report/
          retention-days: 30

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: theme-screenshots-${{ matrix.browser }}
          path: test-results/
          retention-days: 30

      - name: Comment PR with failure details
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let comment = '## 🚨 Theme Test Failed\n\n';
            comment += 'Theme toggle tests failed on ${{ matrix.browser }}.\n\n';
            comment += 'Please check the uploaded artifacts for detailed screenshots and logs.\n';
            comment += '\n---\n';
            comment += '*This comment was automatically generated by the Theme Tests workflow.*';

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  theme-smoke-test:
    name: Quick Theme Smoke Test
    runs-on: ubuntu-latest
    # Only run this on schedule or manual trigger, not on every PR
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Run quick smoke tests
        run: npx playwright test theme-toggle.spec.ts --grep "theme toggle button is visible|can toggle from light to dark|theme preference persists"

      - name: Create issue if smoke test fails
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🚨 Theme Smoke Test Failed - Production Site',
              body: `The weekly theme smoke test has failed on the production site.

              **Failed at:** ${new Date().toISOString()}

              **Action required:** Please investigate the theme toggle functionality on https://trovesandcoves.ca

              ---
              *This issue was automatically created by the Theme Tests workflow.*`,
              labels: ['bug', 'theme', 'priority: high']
            });

  visual-regression:
    name: Visual Regression Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Build frontend
        run: npm run build

      - name: Start production server
        run: |
          npm install -g serve
          serve -s dist/public -l 3000 &
          sleep 5

      - name: Run visual regression tests
        run: npx playwright test theme-toggle.spec.ts --grep "screenshots match"
        env:
          PRODUCTION_URL: http://localhost:3000

      - name: Upload screenshots for review
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: visual-regression-screenshots
          path: test-results/
          retention-days: 30

  theme-summary:
    name: Theme Test Summary
    runs-on: ubuntu-latest
    needs: [theme-tests]
    if: always()

    steps:
      - name: Check test results
        run: |
          if [ "${{ needs.theme-tests.result }}" == "success" ]; then
            echo "✅ All theme tests passed!"
          else
            echo "❌ Theme tests failed. Please review the logs."
            exit 1
          fi
