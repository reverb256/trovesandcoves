name: Deploy to GitHub Pages

# Triggered when prod branch is updated
on:
  push:
    branches: [ prod ]
  workflow_dispatch:

# Allow one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  # Build job for React frontend
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build React app
        run: npm run build
        env:
          NODE_ENV: production
          VITE_GITHUB_PAGES_URL: https://trovesandcoves.ca

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Generate Open Graph image
        run: |
          # Start preview server in background
          npx vite preview --port 4173 &
          PREVIEW_PID=$!

          # Wait for server to be ready
          for i in {1..30}; do
            if curl -s http://localhost:4173 > /dev/null; then
              break
            fi
            sleep 1
          done

          # Generate og:image from Hero component
          npx tsx scripts/generate-og-image.ts --url=http://localhost:4173

          # Copy generated image to dist
          cp client/public/og-image.jpg dist/public/og-image.jpg

          # Cleanup
          kill $PREVIEW_PID 2>/dev/null || true

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist/public'

  # Deploy to GitHub Pages
  deploy-github-pages:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build-frontend
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
